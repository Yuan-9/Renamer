appId: com.local.renamer
productName: Renamer
directories:
  output: dist
files:
  - dist-renderer/**
  - src/main/**
  - src/preload/**
  - src/shared/**
  - package.json
extraMetadata:
  main: src/main/index.js
win:
  icon: build/icon.ico
  target:
    - nsis
  artifactName: "${productName} Setup ${version}.${ext}"
nsis:
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
